name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Download and Extract Official Full NCNN Vulkan SDK
      run: |
        TARGET_DIR="app/src/main/cpp/ncnn_sdk"
        mkdir -p $TARGET_DIR
        cd $TARGET_DIR
        
        # 下载官方整包
        curl -L -o ncnn-android-vulkan.zip https://github.com/Tencent/ncnn/releases/download/20240410/ncnn-20240410-android-vulkan.zip
        unzip ncnn-android-vulkan.zip
        
        # 查看解压结构确保无误
        ls -la ncnn-20240410-android-vulkan/

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
