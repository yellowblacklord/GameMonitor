name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Download REAL glslang libraries in CI
      run: |
        TARGET_DIR="app/src/main/cpp/ncnn_sdk/libs/arm64-v8a"
        mkdir -p $TARGET_DIR
        # 使用 raw.githubusercontent.com 确保下载到的是真正的二进制静态库，绝非网页文本
        curl -L -o $TARGET_DIR/libglslang.a https://raw.githubusercontent.com/nihui/ncnn-assets/master/android/arm64-v8a/libglslang.a
        curl -L -o $TARGET_DIR/libSPIRV.a https://raw.githubusercontent.com/nihui/ncnn-assets/master/android/arm64-v8a/libSPIRV.a
        curl -L -o $TARGET_DIR/libMachineIndependent.a https://raw.githubusercontent.com/nihui/ncnn-assets/master/android/arm64-v8a/libMachineIndependent.a
        curl -L -o $TARGET_DIR/libGenericCodeGen.a https://raw.githubusercontent.com/nihui/ncnn-assets/master/android/arm64-v8a/libGenericCodeGen.a
        # 顺便打印一下文件大小，只要不是几 KB 的网页文件就稳了
        ls -lh $TARGET_DIR

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
