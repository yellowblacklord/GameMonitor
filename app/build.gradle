plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.yoloscreen'
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.example.yoloscreen"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    // 使用 compileOnly 或者仅仅声明 implementation
    // 确保没有其他地方重复定义这个库
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
