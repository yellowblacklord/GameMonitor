plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.yoloscreen'
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.example.yoloscreen"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }
}

// 确保 dependencies 块是唯一的
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
