plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.yoloscreen'
    compileSdk 34

    defaultConfig {
        applicationId "com.example.yoloscreen"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    // 只保留这一个核心库，确保配置在一次解析中完成
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
